<!doctype html>
<html>
<head><meta charset="utf-8"><title>Customer Login</title></head>
<body>
  <h2>Customer Login</h2>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <ul>
      {% for cat, msg in messages %}
        <li><strong>{{cat}}</strong>: {{msg}}</li>
      {% endfor %}
      </ul>
    {% endif %}
  {% endwith %}
  <form method="post" action="{{ url_for('customer_login') }}">
    <label>ID: <input name="customer_id" /></label><br/>
    <label>Name: <input name="customer_name" /></label><br/>
    <button type="submit">Login</button>
  </form>
  <p><a href="{{ url_for('menu') }}">Go to Menu</a></p>
</body>
</html>
